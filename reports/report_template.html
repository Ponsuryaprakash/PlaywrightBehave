<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Execution Report</title>

<style>
body {
    font-family: "Segoe UI", sans-serif;
    margin: 0;
    padding: 20px;
    background: #f4f6f8;
    transition: background 0.3s, color 0.3s;
}

.dark {
    background: #1e1e1e;
    color: #e0e0e0;
}

h1 { margin-bottom: 10px; }

.topbar {
    display:flex;
    gap:15px;
    align-items:center;
    margin-bottom:20px;
    position:sticky;
    top:0;
    background:inherit;
    padding-bottom:10px;
}

input, select, button {
    padding:6px 10px;
    border-radius:4px;
    border:1px solid #ccc;
}

button {
    cursor:pointer;
}

.summary {
    margin-bottom:20px;
    font-weight:bold;
    font-size:15px;
}

.scenario {
    background:white;
    margin-bottom:18px;
    border-radius:8px;
    padding:15px;
    box-shadow:0 3px 8px rgba(0,0,0,0.08);
    transition: transform 0.2s;
}

.dark .scenario {
    background:#2a2a2a;
}

.scenario:hover {
    transform: scale(1.01);
}

.scenario-header {
    cursor:pointer;
    font-weight:600;
    font-size:16px;
}

.tags {
    margin-top:5px;
    font-size:12px;
}

.tag {
    display:inline-block;
    background:#007bff;
    color:white;
    padding:2px 8px;
    border-radius:10px;
    margin-right:5px;
    font-size:11px;
}

.status-badge {
    padding:3px 8px;
    border-radius:12px;
    font-size:12px;
    margin-left:10px;
    color:white;
}

.badge-passed { background:#28a745; }
.badge-failed, .badge-error { background:#dc3545; }
.badge-skipped { background:#6c757d; }

.progress-bar {
    margin-top:8px;
    height:6px;
    background:#ddd;
    border-radius:4px;
    overflow:hidden;
}

.progress-fill {
    height:100%;
    background:#28a745;
}

.steps {
    display:none;
    margin-top:12px;
}

.step {
    margin:8px 0;
    padding:10px;
    border-radius:6px;
    background:#fafafa;
    border-left:6px solid grey;
    transition:background 0.2s;
}

.dark .step {
    background:#333;
}

.step.passed { border-left-color:#28a745; }
.step.failed, .step.error { border-left-color:#dc3545; }
.step.skipped { border-left-color:#6c757d; }

.step-header {
    cursor:pointer;
    font-weight:500;
}

.step-duration {
    font-size:12px;
    margin-left:10px;
    color:#666;
}

.events {
    display:none;
    margin-top:8px;
    padding-left:10px;
}

.event {
    font-size:14px;
    margin:4px 0;
}

.timeline {
    font-size:11px;
    color:#888;
}

.screenshot-thumb {
    max-width:150px;
    border:1px solid #ccc;
    margin-top:5px;
    cursor:pointer;
    border-radius:4px;
}

.modal {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    justify-content:center;
    align-items:center;
}

.modal img {
    max-width:90%;
    max-height:90%;
    border-radius:6px;
}

.stacktrace {
    display:none;
    background:#111;
    color:#0f0;
    padding:10px;
    margin-top:8px;
    font-size:12px;
    border-radius:4px;
    overflow:auto;
}

.metrics {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(160px,1fr));
    gap:15px;
    margin-bottom:20px;
}

.card {
    padding:18px;
    border-radius:12px;
    color:white;
    box-shadow:0 5px 12px rgba(0,0,0,0.1);
    transition: transform 0.2s;
}

.card:hover {
    transform: translateY(-3px);
}

.card.total { background:#3f51b5; }
.card.passed { background:#28a745; }
.card.failed { background:#dc3545; }
.card.skipped { background:#6c757d; }
.card.duration { background:#ff9800; }

.metric-number {
    font-size:26px;
    font-weight:bold;
}

.metric-label {
    font-size:13px;
    opacity:0.9;
}

.execution-info {
    display:flex;
    gap:40px;
    font-size:14px;
    margin-bottom:15px;
}

.controls {
    display:flex;
    align-items:center;
    gap:20px;
    margin-bottom:20px;
}

.status-pills {
    display:flex;
    gap:10px;
}

.pill {
    padding:6px 14px;
    border-radius:20px;
    cursor:pointer;
    background:#ddd;
    font-size:13px;
}

.pill.active {
    font-weight:bold;
    background:#333;
    color:white;
}

.pill.passed { background:#28a745; color:white; }
.pill.failed { background:#dc3545; color:white; }
.pill.skipped { background:#6c757d; color:white; }

/* Toggle Switch */
.switch {
  position: relative;
  display: inline-block;
  width: 40px;
  height: 20px;
}
.switch input { display:none; }
.slider {
  position:absolute;
  cursor:pointer;
  top:0; left:0; right:0; bottom:0;
  background-color:#ccc;
  border-radius:20px;
}
.slider:before {
  position:absolute;
  content:"";
  height:16px;
  width:16px;
  left:2px;
  bottom:2px;
  background:white;
  transition:0.4s;
  border-radius:50%;
}
input:checked + .slider {
  background:#2196F3;
}
input:checked + .slider:before {
  transform: translateX(20px);
}

.execution-card {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
    gap:15px;
    margin-bottom:25px;
}

.exec-item {
    background:white;
    padding:16px;
    border-radius:10px;
    box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

.dark .exec-item {
    background:#2a2a2a;
}

.exec-label {
    font-size:13px;
    color:#777;
    margin-bottom:5px;
}

.exec-value {
    font-size:15px;
    font-weight:600;
}

.exec-item.highlight {
    background:#ff9800;
    color:white;
}

.dark .exec-item.highlight {
    background:#ff9800;
}

.datatable-wrapper {
    margin-top:10px;
    overflow-x:auto;       /* allows horizontal scroll if large */
}

.datatable {
    border-collapse: collapse;
    width: auto;           /* IMPORTANT: auto instead of 100% */
    min-width: max-content; /* ensures no squishing */
    font-size:13px;
}

.datatable th,
.datatable td {
    border:1px solid #ddd;
    padding:6px 12px;
    text-align:left;
    white-space: nowrap;   /* prevents breaking words */
}

.datatable th {
    background:#007bff;
    color:white;
    font-weight:600;
}

.dark .datatable th {
    background:#0056b3;
}

.datatable tr:nth-child(even) {
    background:#f8f8f8;
}

.dark .datatable tr:nth-child(even) {
    background:#3a3a3a;
}

</style>
</head>

<body>

<h1>Execution Report</h1>
<div class="metrics">

  <div class="card total">
      <div class="metric-number" id="totalCount"></div>
      <div class="metric-label">Total Scenarios</div>
  </div>

  <div class="card passed">
      <div class="metric-number" id="passedCount"></div>
      <div class="metric-label">Passed</div>
  </div>

  <div class="card failed">
      <div class="metric-number" id="failedCount"></div>
      <div class="metric-label">Failed</div>
  </div>

  <div class="card skipped">
      <div class="metric-number" id="skippedCount"></div>
      <div class="metric-label">Skipped</div>
  </div>

  <div class="card duration">
      <div class="metric-number" id="durationCount"></div>
      <div class="metric-label">Total Duration</div>
  </div>

</div>

<div class="execution-card">
    <div class="exec-item">
        <div class="exec-label">🚀 Start Time</div>
        <div class="exec-value" id="startTime"></div>
    </div>

    <div class="exec-item">
        <div class="exec-label">🏁 End Time</div>
        <div class="exec-value" id="endTime"></div>
    </div>

    <!-- <div class="exec-item highlight">
        <div class="exec-label">⏱ Total Duration</div>
        <div class="exec-value" id="totalDuration"></div>
    </div> -->

    <div class="exec-item">
        <div class="exec-label">🧪 Environment</div>
        <div class="exec-value" id="environment"></div>
    </div>
</div>

<div class="controls">
    <input type="text" id="searchBox" placeholder="🔎 Search scenario..." onkeyup="filterScenarios()">

    <div class="status-pills">
        <span class="pill active" data-status="all" onclick="setFilter(this)">All</span>
        <span class="pill passed" data-status="passed" onclick="setFilter(this)">Passed</span>
        <span class="pill failed" data-status="failed" onclick="setFilter(this)">Failed</span>
        <span class="pill skipped" data-status="skipped" onclick="setFilter(this)">Skipped</span>
    </div>

    <label class="switch">
        <input type="checkbox" onchange="toggleDark()">
        <span class="slider"></span>
    </label>
</div>

<div id="content"></div>

<div id="imgModal" class="modal" onclick="this.style.display='none'">
    <img id="modalImg">
</div>

<script>
const data = {{DATA}};

function calculateSummary(){
    let total=data.scenarios.length;
    let passed=0,failed=0,skipped=0;

    data.scenarios.forEach(s=>{
        if(s.status==="passed") passed++;
        else if(s.status==="skipped") skipped++;
        else failed++;
    });

    let totalDuration = data.scenarios
        .reduce((acc,s)=>acc+s.duration,0)
        .toFixed(2);

    return {total,passed,failed,skipped,totalDuration};
}

function renderMetrics(){
    const summary=calculateSummary();

    document.getElementById("totalCount").innerText=summary.total;
    document.getElementById("passedCount").innerText=summary.passed;
    document.getElementById("failedCount").innerText=summary.failed;
    document.getElementById("skippedCount").innerText=summary.skipped;
    document.getElementById("durationCount").innerText=summary.totalDuration+"s";

    document.getElementById("startTime").innerText=data.start_time;
    document.getElementById("endTime").innerText=data.end_time;
}

function setFilter(el){
    document.querySelectorAll(".pill").forEach(p=>p.classList.remove("active"));
    el.classList.add("active");

    const status=el.dataset.status;

    document.querySelectorAll(".scenario").forEach(s=>{
        if(status==="all" || s.dataset.status===status)
            s.style.display="block";
        else
            s.style.display="none";
    });
}

function createScenario(s){
    const container=document.createElement("div");
    container.className="scenario";
    container.dataset.status=s.status;

    const header=document.createElement("div");
    header.className="scenario-header";
    header.innerHTML=`
        ${s.name}
        <span class="status-badge badge-${s.status}">${s.status.toUpperCase()}</span>
        <span style="font-size:12px;color:#666;margin-left:10px;">
            (${s.duration}s)
        </span>
    `;

    const tagDiv=document.createElement("div");
    tagDiv.className="tags";
    s.tags.forEach(t=>{
        tagDiv.innerHTML+=`<span class="tag">${t}</span>`;
    });

    const progress=document.createElement("div");
    progress.className="progress-bar";
    const fill=document.createElement("div");
    fill.className="progress-fill";

    const passedSteps=s.steps.filter(x=>x.status==="passed").length;
    fill.style.width=(passedSteps/s.steps.length*100)+"%";
    progress.appendChild(fill);

    const stepsDiv=document.createElement("div");
    stepsDiv.className="steps";

    s.steps.forEach(step=>{
        const stepDiv=document.createElement("div");
        stepDiv.className=`step ${step.status}`;

        const icon= step.status==="passed"?"🟢":
                    step.status==="skipped"?"⚪":"🔴";

        const stepHeader=document.createElement("div");
        stepHeader.className="step-header";
        stepHeader.innerHTML=`
            ${icon} ${step.keyword} ${step.name}
            <span class="step-duration">(${step.duration}s)</span>
        `;



        const eventsDiv=document.createElement("div");
        eventsDiv.className="events";

        if(step.datatable && step.datatable.headings){
    const tableWrapper = document.createElement("div");
    tableWrapper.className = "datatable-wrapper";

    const table = document.createElement("table");
    table.className = "datatable";

    // Header
    const thead = document.createElement("thead");
    const headerRow = document.createElement("tr");

    step.datatable.headings.forEach(h=>{
        const th = document.createElement("th");
        th.innerText = h;
        headerRow.appendChild(th);
    });

    thead.appendChild(headerRow);
    table.appendChild(thead);

    // Body
    const tbody = document.createElement("tbody");

    step.datatable.rows.forEach(row=>{
        const tr = document.createElement("tr");

        row.forEach(cell=>{
            const td = document.createElement("td");
            td.innerText = cell;
            tr.appendChild(td);
        });

        tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    tableWrapper.appendChild(table);
    eventsDiv.appendChild(tableWrapper);
}

        step.events.forEach(e=>{
            const ev=document.createElement("div");
            ev.className="event";

           


            if(e.type==="log"){
                ev.innerHTML=`📝 ${e.message}
                    <span class="timeline">(${e.timestamp}s)</span>`;
            }

            if(e.type==="screenshot"){
                ev.innerHTML=`📸 Screenshot<br>
                    <img class="screenshot-thumb"
                    src="data:image/png;base64,${e.data}"
                    onclick="openModal(this.src)">`;
            }

            eventsDiv.appendChild(ev);
        });

        // Render DataTable if present
 




        if(step.stack_trace){
            const btn=document.createElement("button");
            btn.innerText="Toggle Stack Trace";
            btn.onclick=()=>trace.style.display=
                trace.style.display==="block"?"none":"block";

            const trace=document.createElement("div");
            trace.className="stacktrace";
            trace.innerText=step.stack_trace;

            eventsDiv.appendChild(btn);
            eventsDiv.appendChild(trace);
        }

        stepHeader.onclick=()=>{
            eventsDiv.style.display=
                eventsDiv.style.display==="block"?"none":"block";
        };

        stepDiv.appendChild(stepHeader);
        stepDiv.appendChild(eventsDiv);
        stepsDiv.appendChild(stepDiv);
    });

    header.onclick=()=>{
        stepsDiv.style.display=
            stepsDiv.style.display==="block"?"none":"block";
    };

    container.appendChild(header);
    container.appendChild(tagDiv);
    container.appendChild(progress);
    container.appendChild(stepsDiv);

    return container;
}

function render(){
    const summary=calculateSummary();

    const content=document.getElementById("content");
    data.scenarios.forEach(s=>{
        content.appendChild(createScenario(s));
    });
}

function filterScenarios(){
    const search=document.getElementById("searchBox").value.toLowerCase();
    const filter=document.getElementById("statusFilter").value;

    document.querySelectorAll(".scenario").forEach(s=>{
        const name=s.querySelector(".scenario-header").innerText.toLowerCase();
        const status=s.dataset.status;

        let show=true;
        if(search && !name.includes(search)) show=false;
        if(filter!=="all" && status!==filter) show=false;

        s.style.display=show?"block":"none";
    });
}

function toggleDark(){
    document.body.classList.toggle("dark");
}

function openModal(src){
    document.getElementById("modalImg").src=src;
    document.getElementById("imgModal").style.display="flex";
}

function cleanIsoString(isoString){
    // Remove microseconds beyond 3 digits
    return isoString.replace(/\.(\d{3})\d+/, ".$1");
}

function formatDateTime(isoString){
    const cleaned = cleanIsoString(isoString);
    const date = new Date(cleaned);

    return date.toLocaleString(undefined, {
        year: "numeric",
        month: "short",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
    });
}

function calculateExecutionDuration(start, end){
    const startDate = new Date(start);
    const endDate = new Date(end);

    const diffMs = endDate - startDate;
    const seconds = (diffMs / 1000).toFixed(2);

    return seconds + " seconds";
}

function renderExecutionInfo(){
    document.getElementById("startTime").innerText =
        formatDateTime(data.start_time);

    document.getElementById("endTime").innerText =
        formatDateTime(data.end_time);

    // document.getElementById("totalDuration").innerText =
    //     calculateExecutionDuration(data.start_time, data.end_time);

    document.getElementById("environment").innerText =
        "Playwright";
}

renderExecutionInfo();
renderMetrics();
render();
</script>

</body>
</html>
